name: Update Contribution Graph

on:
  schedule:
    # Runs every day at 12:05 AM UTC
    - cron: "5 0 * * *"

  # Allows manual execution
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-graph:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update contribution graph dates
        run: |
          FROM_DATE=$(date -u -d "14 days ago" +"%Y-%m-%d")
          TO_DATE=$(date -u +"%Y-%m-%d")

          python3 << EOF
          import re

          with open("README.md", "r", encoding="utf-8") as file:
              content = file.read()

          new_graph = """<!-- ACTIVITY-GRAPH-START -->

          [![Abhirama's GitHub activity graph](https://github-readme-activity-graph.vercel.app/graph?username=A6h1ramahy&theme=tokyo-night&from=${FROM_DATE}&to=${TO_DATE})](https://github.com/A6h1ramahy)

          <!-- ACTIVITY-GRAPH-END -->"""

          content = re.sub(
              r"<!-- ACTIVITY-GRAPH-START -->.*?<!-- ACTIVITY-GRAPH-END -->",
              new_graph,
              content,
              flags=re.DOTALL
          )

          with open("README.md", "w", encoding="utf-8") as file:
              file.write(content)
          EOF

      - name: Commit updated dates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add README.md
          git diff --cached --quiet || git commit -m "Update contribution graph date range"
          git push
